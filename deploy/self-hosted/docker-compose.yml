version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: switchyard
      POSTGRES_PASSWORD: switchyard
      POSTGRES_DB: switchyard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    image: node:22-alpine
    working_dir: /workspace
    command: ["sh", "-lc", "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @switchyard/server dev"]
    environment:
      SWITCHYARD_DEPLOYMENT_MODE: staging
      SWITCHYARD_POSTGRES_URL: postgres://switchyard:switchyard@postgres:5432/switchyard
      SWITCHYARD_REDIS_URL: redis://redis:6379/0
      SWITCHYARD_OBJECT_STORE_DIR: /var/switchyard/objects
      SWITCHYARD_NODE_SHARED_TOKEN: switchyard-node-token
      SWITCHYARD_HOSTED_RUNTIME_ALLOWLIST: fake.deterministic
    volumes:
      - ../..:/workspace
      - objectdata:/var/switchyard/objects
    depends_on:
      - postgres
      - redis

  worker:
    image: node:22-alpine
    working_dir: /workspace
    command: ["sh", "-lc", "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @switchyard/worker dev"]
    environment:
      SWITCHYARD_DEPLOYMENT_MODE: staging
      SWITCHYARD_POSTGRES_URL: postgres://switchyard:switchyard@postgres:5432/switchyard
      SWITCHYARD_REDIS_URL: redis://redis:6379/0
      SWITCHYARD_OBJECT_STORE_DIR: /var/switchyard/objects
      SWITCHYARD_HOSTED_RUNTIME_ALLOWLIST: fake.deterministic
    volumes:
      - ../..:/workspace
      - objectdata:/var/switchyard/objects
    depends_on:
      - server

volumes:
  pgdata:
  objectdata:
