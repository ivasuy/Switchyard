services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${SWITCHYARD_POSTGRES_DB:-switchyard}
      POSTGRES_USER: ${SWITCHYARD_POSTGRES_USER:-switchyard}
      POSTGRES_PASSWORD: ${SWITCHYARD_POSTGRES_PASSWORD:?set-in-.env}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  server:
    image: replace-with-switchyard-server-image
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "apps/server/dist/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"Promise.all([fetch('http://127.0.0.1:4646/health'),fetch('http://127.0.0.1:4646/ready')]).then(([health,ready])=>process.exit(health.ok&&ready.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "4646:4646"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  worker:
    image: replace-with-switchyard-worker-image
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "apps/worker/dist/main.js"]
    depends_on:
      server:
        condition: service_healthy

  node:
    image: replace-with-switchyard-node-image
    restart: unless-stopped
    env_file:
      - .env
    command: ["node", "apps/node/dist/main.js"]
    profiles: ["optional-node"]
    depends_on:
      server:
        condition: service_healthy

  server-ready:
    image: replace-with-switchyard-server-image
    restart: "no"
    env_file:
      - .env
    command: ["node", "-e", "fetch('http://server:4646/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
    depends_on:
      server:
        condition: service_healthy
    profiles: ["ops-check"]

volumes:
  pgdata:
  redisdata:
