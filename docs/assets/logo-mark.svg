<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Switchyard">
  <title>Switchyard</title>
  <rect width="256" height="256" rx="56" fill="#0B0F14"/>
  <g fill="none" stroke="#F5F7FA" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Inbound tracks (left, fan in) -->
    <path d="M28 64 L112 128"/>
    <path d="M28 128 L112 128"/>
    <path d="M28 192 L112 128"/>
    <!-- Outbound tracks (right, fan out) -->
    <path d="M144 128 L228 64"/>
    <path d="M144 128 L228 128"/>
    <path d="M144 128 L228 192"/>
  </g>
  <!-- Switch node -->
  <circle cx="128" cy="128" r="22" fill="#F5F7FA"/>
  <circle cx="128" cy="128" r="9" fill="#0B0F14"/>
</svg>
