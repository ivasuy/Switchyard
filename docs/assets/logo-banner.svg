<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Switchyard — runtime gateway for agent runtimes">
  <title>Switchyard</title>
  <rect width="1280" height="320" fill="#0B0F14"/>
  <!-- Decorative tracks across the banner -->
  <g fill="none" stroke="#1A2330" stroke-width="2" stroke-linecap="round">
    <path d="M0 60 L1280 60"/>
    <path d="M0 110 L1280 110"/>
    <path d="M0 210 L1280 210"/>
    <path d="M0 260 L1280 260"/>
  </g>
  <!-- Mark + wordmark, centered vertically -->
  <g transform="translate(120,80)">
    <rect width="160" height="160" rx="36" fill="#F5F7FA"/>
    <g fill="none" stroke="#0B0F14" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 40 L70 80"/>
      <path d="M18 80 L70 80"/>
      <path d="M18 120 L70 80"/>
      <path d="M90 80 L142 40"/>
      <path d="M90 80 L142 80"/>
      <path d="M90 80 L142 120"/>
    </g>
    <circle cx="80" cy="80" r="14" fill="#0B0F14"/>
    <circle cx="80" cy="80" r="5" fill="#F5F7FA"/>
  </g>
  <text x="320" y="180"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="92" font-weight="700" letter-spacing="-2.5" fill="#F5F7FA">
    Switchyard
  </text>
  <text x="322" y="226"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="500" letter-spacing="0.5" fill="#9AA3AE">
    one backend API for every agent runtime
  </text>
</svg>
